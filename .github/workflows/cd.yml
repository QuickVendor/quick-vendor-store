name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: backend
            path: quick-vendor-nestjs-backend
            image: quickvendor-backend
            target: production
          - service: storefront
            path: quick-vendor-store-front
            image: quickvendor-storefront
            target: runner
          - service: admin
            path: quick-vendor-admin
            image: quickvendor-admin
            target: runner
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.path }}
          push: true
          target: ${{ matrix.target }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan ${{ matrix.service }} image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image }}:${{ github.event.workflow_run.head_sha }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  deploy:
    name: Deploy to Railway Staging
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to staging
        working-directory: quick-vendor-nestjs-backend
        run: railway up --service quickvendor-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy storefront to staging
        working-directory: quick-vendor-store-front
        run: railway up --service quickvendor-storefront --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy admin to staging
        working-directory: quick-vendor-admin
        run: railway up --service quickvendor-admin --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
