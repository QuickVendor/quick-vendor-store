# =================================================
# QuickVendor — Staging (VPS port 4001)
# =================================================
# Usage:
#   yarn quickvendor:staging          → start
#   yarn quickvendor:staging:build    → rebuild & start
#   yarn quickvendor:staging:down     → stop
# =================================================

services:
  app:
    build:
      context: .
      target: production
    container_name: quickvendor-staging-app
    restart: unless-stopped
    env_file: .env.staging
    ports:
      - '4001:3000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_staging:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  db:
    image: postgres:16-alpine
    container_name: quickvendor-staging-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quickvendor_staging}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-quickvendor_staging}
    ports:
      - '5433:5432'
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-quickvendor_staging} -d ${POSTGRES_DB:-quickvendor_staging}' ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_staging:
  uploads_staging:
